<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheRedKeep</title>
</head>
<body style="background-color:rgb(222, 221, 221)">
<header style="background-color: aquamarine; 
                font-size: 20px;
                color: rgb(255, 255, 255);
                text-align: center;">
  <img src="placeholder_logo.png" alt="TheRedKeep Logo">
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </nav>
</header>
<main >
  <h1 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 30px;">
    Customer Satisfaction Survey</h1>
  <form action="#" method="post">
    <label for="product">Select Product:</label>
    <select name="product" id="product">
      <option value="product1">Product 1</option>
      <option value="product2">Product 2</option>
      <option value="product3">Product 3</option>
    </select>

    <label for= "rating" >Rating:</label>
    <div>
      <input type="radio" id="rating1" name="rating" value="1">
      <label for="rating1">1</label>
      <input type="radio" id="rating2" name="rating" value="2">
      <label for="rating2">2</label>
      <input type="radio" id="rating3" name="rating" value="3">
      <label for="rating3">3</label>
      <input type="radio" id="rating4" name="rating" value="4">
      <label for="rating4">4</label>
      <input type="radio" id="rating5" name="rating" value="5">
      <label for="rating5">5</label>
    </div>
    <label for="feedback">Comments:</label>
    <textarea name="feedback" id="feedback" placeholder="Enter your comments here..."></textarea>
    <input type="submit" value="Submit">
  </form>
</main>
<footer style="text-align: center;
                ;">
  <p>TheRedKeep© 2024</p>
  <img src="placeholder_social1.png" alt="Social Media Icon" >
  <img src="placeholder_social2.png" alt="Social Media Icon">
  <img src="placeholder_social3.png" alt="Social Media Icon">
  <img src="placeholder_social4.png" alt="Social Media Icon">
</footer>
</body>
</html>
